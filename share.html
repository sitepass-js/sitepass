<script>
(function(){

  var DOC_TITLES={businessLicense:'사업자등록증',equipmentRegistration:'장비등록증',equipmentInspection:'장비검사증',insurancePolicy:'장비보험증권',specSheet:'장비제원표',ndtInspection:'장비비파괴검사증',equipmentLedger:'장비갑원부',otherEquipment:'기타 장비서류',driverIdCard:'기사 신분증',driverLicense:'기사 면허증',driverBasicSafetyTraining:'기사 건설기초안전보건교육 이수증',driverMachinerySafetyTraining:'기사 건설기계조종사 안전교육 이수증',driverSpecialHealthCheck:'기사 특수건강검진',otherDriverDoc:'기타 기사서류',workerIdCard:'인부 신분증',workerBasicSafetyTraining:'인부 건설기초안전보건교육 이수증',otherWorkerDoc:'기타 인부서류'};
  var DOC_ORDER=['businessLicense','equipmentRegistration','equipmentInspection','insurancePolicy','specSheet','ndtInspection','equipmentLedger','otherEquipment','driverIdCard','driverLicense','driverBasicSafetyTraining','driverMachinerySafetyTraining','driverSpecialHealthCheck','otherDriverDoc','workerIdCard','workerBasicSafetyTraining','otherWorkerDoc'];

  function esc(value){return String(value==null?'':value).replace(/[&<>'"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];});}
  function parseRoute(){
    var p=new URLSearchParams(location.search||'');
    var code=String(p.get('manager')||p.get('m')||'').trim();
    var sig=String(p.get('sig')||'').trim();
    var hash=String(location.hash||'');
    if(!code&&/^#manager=/i.test(hash)){
      var raw=hash.replace(/^#manager=/i,'').split('&');
      try{code=decodeURIComponent(raw.shift()||'').trim();}catch(e){code=String(raw.shift()||'').trim();}
      raw.forEach(function(part){var pair=part.split('=');if(pair[0]==='sig')sig=decodeURIComponent(pair.slice(1).join('=')||'');});
    }
    return {code:code,sig:sig,fromMember:p.get('from')==='member'||p.get('preview')==='member'};
  }
  function setExitMode(){
    if(state.fromMember){exitButton.textContent='← 보관함으로 돌아가기';navLabel.textContent='회원용 링크화면 미리보기';}

  }
  function exitViewer(){
    closeModal();
    try{sessionStorage.setItem('sitepass_last_screen_v491',state.fromMember?'listScreen':'homeScreen');}catch(e){}
    var target=new URL('./',location.href);target.search='';target.hash='';
    location.assign(target.toString());
  }
  exitButton.addEventListener('click',exitViewer);

  function parseObject(value){
    if(!value)return null;
    if(typeof value==='object')return value;
    if(typeof value==='string'){
      var text=value.trim();if(!text)return null;
      try{var parsed=JSON.parse(text);return parsed&&typeof parsed==='object'?parsed:null;}catch(e){return null;}
    }
    return null;
  }
  function collectCandidates(root){
    var out=[],seen=new WeakSet();
    function walk(input,depth){
      var node=parseObject(input);if(!node||depth>8||seen.has(node))return;
      seen.add(node);
      if(Array.isArray(node)){node.forEach(function(v){walk(v,depth+1);});return;}
      out.push(node);
      ['item_data','payload','item_json','item','data','share_item','shareItem','result','row','record'].forEach(function(key){if(node[key])walk(node[key],depth+1);});
    }
    walk(root,0);return out;
  }
  function looksLikeDoc(value){
    var d=parseObject(value);if(!d||Array.isArray(d))return false;
    return !!(d.fileName||d.filename||d.pages||d.files||d.attachments||d.previewDataUrl||d.storagePath||d.storagePublicUrl||d.fileUrl||d.expireDate||d.status);
  }
  function normalizeItem(root,code){
    var candidates=collectCandidates(root),merged={},docs={};
    candidates.slice().reverse().forEach(function(c){
      Object.keys(c).forEach(function(key){
        if(['item_data','payload','item_json','item','data','share_item','shareItem','result','docs','documents'].indexOf(key)<0&&c[key]!==undefined&&c[key]!==null&&c[key]!=='')merged[key]=c[key];
      });
      var cDocs=parseObject(c.docs)||c.docs;
      if(Array.isArray(cDocs))cDocs.forEach(function(raw,i){var d=parseObject(raw);if(!d)return;var key=String(d.key||d.docKey||d.doc_key||d.type||d.kind||('document'+(i+1))).trim();if(key)docs[key]=Object.assign({},docs[key]||{},d,{key:key});});
      else if(cDocs&&typeof cDocs==='object')Object.keys(cDocs).forEach(function(key){var d=parseObject(cDocs[key]);if(d)docs[key]=Object.assign({},docs[key]||{},d,{key:String(d.key||key)});});
      var cDocuments=parseObject(c.documents)||c.documents;
      if(Array.isArray(cDocuments))cDocuments.forEach(function(raw,i){var d=parseObject(raw);if(!d)return;var key=String(d.key||d.docKey||d.doc_key||d.type||d.kind||('document'+(i+1))).trim();if(key)docs[key]=Object.assign({},docs[key]||{},d,{key:key});});
      Object.keys(DOC_TITLES).forEach(function(key){if(looksLikeDoc(c[key]))docs[key]=Object.assign({},docs[key]||{},parseObject(c[key])||c[key],{key:key});});
    });
    merged.docs=docs;merged.code=String(code||merged.code||merged.share_code||merged.publicShareCode||merged.managerShareCode||'').trim();
    return merged;
  }
  function firstValue(obj,keys){for(var i=0;i<keys.length;i++){var v=obj&&obj[keys[i]];if(v!==undefined&&v!==null&&String(v).trim())return String(v).trim();}return '';}
  function unique(values){var seen={};return (values||[]).filter(function(v){v=String(v||'').trim();if(!v||seen[v])return false;seen[v]=true;return true;});}
  function isUsableUrl(value){var text=String(value||'').trim();return !!text&&!/^blob:/i.test(text)&&/^(data:|https?:\/\/|\/)/i.test(text);}
  function normalizeEncodedPath(path){
    return String(path||'').split('/').filter(Boolean).map(function(part){try{return encodeURIComponent(decodeURIComponent(part));}catch(e){return encodeURIComponent(part);}}).join('/');
  }
  function absoluteStorageUrl(path,bucket){
    path=String(path||'').trim();if(!path)return '';
    if(/^blob:/i.test(path))return '';
    if(/^(data:|https?:\/\/)/i.test(path))return path;
    path=path.replace(/^\/+/, '').replace(/^storage\/v1\/object\/(?:public|sign|authenticated)\//i,'');
    bucket=String(bucket||STORAGE_BUCKET).trim()||STORAGE_BUCKET;
    if(path.indexOf(bucket+'/')===0)path=path.slice(bucket.length+1);
    if(path.indexOf('public/'+bucket+'/')===0)path=path.slice(('public/'+bucket+'/').length);
    var encoded=normalizeEncodedPath(path);
    return encoded?SUPABASE_URL+'/storage/v1/object/public/'+encodeURIComponent(bucket)+'/'+encoded:'';
  }
  function collectUrlCandidates(value,defaultBucket,depth){
    depth=Number(depth||0);if(depth>3)return [];
    if(typeof value==='string')return isUsableUrl(value)?[absoluteStorageUrl(value,defaultBucket)]:[];
    if(!value||typeof value!=='object')return [];
    var bucket=firstValue(value,['storageBucket','storage_bucket','bucket','bucketName','bucket_name'])||defaultBucket||STORAGE_BUCKET;
    var out=[];
    var pathKeys=['storagePath','storage_path','storageKey','storage_key','filePath','file_path','objectPath','object_path','uploadPath','upload_path','storedPath','stored_path','path'];
    pathKeys.forEach(function(key){var v=value[key];if(typeof v==='string'&&v.trim())out.push(absoluteStorageUrl(v,bucket));});
    var publicKeys=['storagePublicUrl','storage_public_url','publicUrl','public_url'];
    publicKeys.forEach(function(key){var v=value[key];if(isUsableUrl(v))out.push(absoluteStorageUrl(v,bucket));});
    var stableKeys=['fileUrl','file_url','downloadUrl','download_url','signedUrl','signed_url','url','src','imageUrl','image_url','previewUrl','preview_url'];
    stableKeys.forEach(function(key){var v=value[key];if(isUsableUrl(v))out.push(absoluteStorageUrl(v,bucket));});
    var previewKeys=['fileDataUrl','dataUrl','originalDataUrl','correctedDataUrl','previewDataUrl','editDataUrl'];
    previewKeys.forEach(function(key){var v=value[key];if(isUsableUrl(v))out.push(absoluteStorageUrl(v,bucket));});
    ['file','asset','upload','storage','original','corrected','preview'].forEach(function(key){if(value[key]&&typeof value[key]==='object')out=out.concat(collectUrlCandidates(value[key],bucket,depth+1));});
    return unique(out);
  }
  function sanitizePathPart(value,fallback){
    var text=String(value||fallback||'file').trim();
    return text.replace(/[^0-9a-zA-Z가-힣._-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,80)||String(fallback||'file');
  }
  function filePathFromRow(row){return firstValue(row,['storagePath','storage_path','name','path','objectPath','object_path']).replace(/^\/+/, '');}
  function normalizeServerFiles(payload){
    var root=parseObject(payload)||{};var list=Array.isArray(root)?root:(Array.isArray(root.files)?root.files:[]);
    return list.map(function(row){
      row=parseObject(row)||{};var path=filePathFromRow(row);if(!path)return null;
      var parts=path.split('/').filter(Boolean);
      return {storagePath:path,storageBucket:firstValue(row,['storageBucket','storage_bucket','bucket','bucket_id'])||STORAGE_BUCKET,docKey:firstValue(row,['docKey','doc_key'])||(parts[2]||''),fileName:firstValue(row,['fileName','file_name'])||(parts[parts.length-1]||'첨부파일'),updatedAt:firstValue(row,['updatedAt','updated_at','createdAt','created_at']),matchSource:firstValue(row,['matchSource','match_source'])};
    }).filter(Boolean);
  }
  function canonicalDocKey(key,title){
    var rawKey=String(key||'').trim(),rawTitle=String(title||'').replace(/\s+/g,'').trim();
    if(DOC_TITLES[rawKey])return rawKey;
    var normalized=sanitizePathPart(rawKey,'').toLowerCase();
    for(var i=0;i<DOC_ORDER.length;i++){
      var candidate=DOC_ORDER[i],candidateTitle=String(DOC_TITLES[candidate]||'').replace(/\s+/g,'');
      if(normalized&&sanitizePathPart(candidate,'').toLowerCase()===normalized)return candidate;
      if(rawTitle&&candidateTitle===rawTitle)return candidate;
    }
    if(/driver|기사/i.test(rawKey+' '+title))return rawKey||'otherDriverDoc';
    if(/worker|인부/i.test(rawKey+' '+title))return rawKey||'otherWorkerDoc';
    return rawKey;
  }
  function docGroupInfo(key,title,groupTitle){
    var canonical=canonicalDocKey(key,title),index=DOC_ORDER.indexOf(canonical),group='equipment';
    if(/^driver/i.test(canonical)||/기사/.test(String(groupTitle||'')+' '+String(title||'')))group='driver';
    else if(/^worker/i.test(canonical)||/인부/.test(String(groupTitle||'')+' '+String(title||'')))group='worker';
    return {canonicalKey:canonical,group:group,groupOrder:group==='equipment'?0:(group==='driver'?1:2),order:index>=0?index:999,title:DOC_TITLES[canonical]||title||key||'등록서류',groupTitle:DOC_GROUPS[group]};
  }
  function storagePagesFromFiles(files){

    var doc=state.docs[Number(index)];if(!doc)return;showToast('원본 파일을 확인하고 있습니다.');
    var entries=pageEntriesForDoc(doc),url='';for(var i=0;i<entries.length&&!url;i++)url=await workingUrlForEntry(entries[i]);
    if(!url){showToast('서버에 연결된 실제 파일이 없습니다. 회원 보관함에서 원본 서류를 다시 저장한 뒤 링크를 열어주세요.');return;}
    window.open(url,'_blank','noopener');
  }
  async function openDetail(index){
    var doc=state.docs[Number(index)];if(!doc)return;
    closeModal();var modal=document.createElement('div');modal.id='docModal';modal.className='modal';modal.innerHTML='<div class="backdrop" data-close-modal></div><div class="sheet" role="dialog" aria-modal="true" aria-label="'+esc(doc.title)+' 상세보기"><div class="modal-head"><div><small>SitePass 서류 상세보기</small><strong>'+esc(doc.title)+'</strong></div><button class="close-x" type="button" data-close-modal aria-label="닫기">×</button></div><div class="modal-body"><section class="page"><div class="missing-page">실제 Storage 파일을 확인하는 중입니다.</div></section></div><button class="close-bottom" type="button" data-close-modal>닫기</button></div>';document.body.appendChild(modal);document.body.classList.add('modal-open');
    var entries=pageEntriesForDoc(doc);var resolved=await Promise.all(entries.map(async function(entry){entry.workingUrl=await workingUrlForEntry(entry);return entry;}));
    if(!document.body.contains(modal))return;
    var html=resolved.map(function(entry){
      if(!entry.workingUrl)return '<section class="page"><div class="page-title">'+(entry.index+1)+'. '+esc(entry.name)+'</div><div class="missing-page">서버에 연결된 실제 파일이 없습니다.<br>회원 보관함에서 원본 서류를 다시 저장한 뒤 링크를 열어주세요.</div></section>';
      var first=entry.workingUrl,body=entry.pdf?'<iframe src="'+esc(first)+'" title="'+esc(entry.name)+'"></iframe>':'<img src="'+esc(first)+'" alt="'+esc(entry.name)+'">';
      return '<section class="page"><div class="page-title">'+(entry.index+1)+'. '+esc(entry.name)+'</div>'+body+'<div class="page-actions"><button type="button" data-open-url="'+esc(first)+'">원본 새 창</button><button type="button" data-download-page data-doc-index="'+Number(index)+'" data-page-index="'+entry.index+'">다운로드</button><button type="button" data-print-url="'+esc(first)+'">인쇄</button></div></section>';
    }).join('');
    modal.querySelector('.modal-body').innerHTML=html;
  }
  function selectedIndexes(all){var checks=Array.from(document.querySelectorAll('[data-doc-check]'));return checks.filter(function(input){return all||input.checked;}).map(function(input){return Number(input.value);});}
  function updateSelectionState(){
    var checks=Array.from(document.querySelectorAll('[data-doc-check]'));
    var selected=checks.filter(function(input){return input.checked;}).length;
    var stateBox=document.querySelector('[data-selection-state]');
    if(stateBox)stateBox.textContent='선택 '+selected+'/'+checks.length;
    document.querySelectorAll('[data-download-selected],[data-print-selected]').forEach(function(button){button.disabled=selected===0;});
  }
  function setAllChecks(checked){document.querySelectorAll('[data-doc-check]').forEach(function(input){input.checked=!!checked;});updateSelectionState();}
  function fileNameFor(entry,docIndex){var ext=entry.pdf?'pdf':extensionOf(entry.page,entry.doc.raw);var base=safePart(label(state.item)+'_'+(docIndex+1)+'_'+entry.doc.title+'_'+(entry.index+1),'sitepass_document');return base+'.'+ext;}
  async function fetchFirstBlob(candidates){
    var list=unique(candidates);for(var i=0;i<list.length;i++){var url=list[i];try{var res=await timeoutFetch(url,{method:'GET'},7000);if(res.ok){var blob=await res.blob();if(blob&&blob.size)return {blob:blob,url:url};}}catch(e){}}
    return null;
  }
  function saveBlob(blob,name){var url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name||'sitepass-file';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},2500);}
  async function downloadEntry(entry,docIndex){
    if(!entry.candidates.length)throw new Error('파일 주소 없음');
    var found=await fetchFirstBlob(entry.candidates);if(found){saveBlob(found.blob,fileNameFor(entry,docIndex));return true;}
    window.open(entry.candidates[0],'_blank','noopener');return false;
  }
  async function downloadDocs(indexes){
    if(!indexes.length){showToast('다운로드할 서류를 선택해주세요.');return;}
    var available=indexes.filter(function(index){var doc=state.docs[index];return !!(doc&&pageEntriesForDoc(doc).some(function(entry){return entry.candidates.length;}));});
    var missing=indexes.length-available.length;
    if(!available.length){showToast('선택한 서류의 서버 원본이 없습니다. 회원 보관함에서 원본 서류를 다시 저장해주세요.');return;}
    indexes=available;
    var total=0,fail=0;showToast(missing?'원본이 있는 서류만 다운로드합니다.':'서류 다운로드를 준비하고 있습니다.');
    for(var i=0;i<indexes.length;i++){
      var doc=state.docs[indexes[i]];if(!doc)continue;var entries=pageEntriesForDoc(doc);
      for(var j=0;j<entries.length;j++){try{await downloadEntry(entries[j],indexes[i]);total++;}catch(e){fail++;}await new Promise(function(r){setTimeout(r,180);});}
    }
    showToast(fail?'다운로드 '+total+'개 완료, '+fail+'개는 열지 못했습니다.':'다운로드 '+total+'개를 시작했습니다.');
  }
  function printSelected(indexes){
    if(!indexes.length){showToast('인쇄할 서류를 선택해주세요.');return;}
    var pages=[];indexes.forEach(function(index){var doc=state.docs[index];if(!doc)return;pageEntriesForDoc(doc).forEach(function(entry){if(entry.candidates.length)pages.push({title:doc.title,url:entry.candidates[0],pdf:entry.pdf});});});
    if(!pages.length){showToast('선택한 서류의 서버 원본이 없어 인쇄할 수 없습니다.');return;}
    var win=window.open('','_blank');if(!win){showToast('팝업 차단을 해제해주세요.');return;}
    var html='<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>SitePass 서류 인쇄</title><style>body{font-family:Arial,sans-serif;margin:0;padding:16px;background:#eee}.p{page-break-after:always;background:#fff;margin:0 auto 16px;padding:10px}.p h3{font-size:14px}.p img{display:block;max-width:100%;margin:auto}.p iframe{width:100%;height:90vh;border:0}@media print{body{background:#fff;padding:0}.p{box-shadow:none;margin:0;padding:0}}</style></head><body>'+pages.map(function(p){return '<section class="p"><h3>'+esc(p.title)+'</h3>'+(p.pdf?'<iframe src="'+esc(p.url)+'"></iframe>':'<img src="'+esc(p.url)+'">')+'</section>';}).join('')+'<script>window.addEventListener("load",function(){setTimeout(function(){window.print()},700)});<\/script></body></html>';
    win.document.open();win.document.write(html);win.document.close();
  }
  async function copyLink(){var text=makeExternalLink();try{await navigator.clipboard.writeText(text);showToast('담당자 링크를 복사했습니다.');}catch(e){var area=document.createElement('textarea');area.value=text;area.style.position='fixed';area.style.opacity='0';document.body.appendChild(area);area.select();try{document.execCommand('copy');showToast('담당자 링크를 복사했습니다.');}catch(ignore){prompt('아래 링크를 복사해주세요.',text);}area.remove();}}
  function showToast(message){var old=document.querySelector('.toast');if(old)old.remove();var toast=document.createElement('div');toast.className='toast';toast.textContent=message;document.body.appendChild(toast);setTimeout(function(){toast.remove();},2600);}

  document.addEventListener('change',function(event){if(event.target&&event.target.matches&&event.target.matches('[data-doc-check]'))updateSelectionState();});
  document.addEventListener('click',function(event){
    var detail=event.target.closest&&event.target.closest('[data-detail-index]');if(detail){event.preventDefault();openDetail(detail.getAttribute('data-detail-index'));return;}
    var preview=event.target.closest&&event.target.closest('[data-open-detail]');if(preview){event.preventDefault();openDetail(preview.getAttribute('data-open-detail'));return;}
    var retry=event.target.closest&&event.target.closest('[data-retry]');if(retry){event.preventDefault();state.rendered=false;load();return;}
    var close=event.target.closest&&event.target.closest('[data-close-modal]');if(close){event.preventDefault();closeModal();return;}
    var print=event.target.closest&&event.target.closest('[data-print-url]');if(print){event.preventDefault();printUrl(print.getAttribute('data-print-url'));return;}
    var original=event.target.closest&&event.target.closest('[data-open-original]');if(original){event.preventDefault();openOriginal(original.getAttribute('data-open-original'));return;}
    var openUrl=event.target.closest&&event.target.closest('[data-open-url]');if(openUrl){event.preventDefault();window.open(openUrl.getAttribute('data-open-url'),'_blank','noopener');return;}
    var page=event.target.closest&&event.target.closest('[data-download-page]');if(page){event.preventDefault();var di=Number(page.getAttribute('data-doc-index')),pi=Number(page.getAttribute('data-page-index')),doc=state.docs[di],entry=doc&&pageEntriesForDoc(doc)[pi];if(entry)downloadEntry(entry,di).then(function(){showToast('다운로드를 시작했습니다.');}).catch(function(){showToast('파일을 다운로드하지 못했습니다.');});return;}
    if(event.target.closest&&event.target.closest('[data-select-all]')){event.preventDefault();setAllChecks(true);return;}
    if(event.target.closest&&event.target.closest('[data-select-none]')){event.preventDefault();setAllChecks(false);return;}
    if(event.target.closest&&event.target.closest('[data-download-selected]')){event.preventDefault();downloadDocs(selectedIndexes(false));return;}
    if(event.target.closest&&event.target.closest('[data-print-selected]')){event.preventDefault();printSelected(selectedIndexes(false));return;}
  });
  document.addEventListener('keydown',function(event){if(event.key==='Escape')closeModal();});
  var route=parseRoute();state.code=route.code;state.sig=route.sig;state.fromMember=route.fromMember;setExitMode();load();
})();
</script>
</body>
</html>
