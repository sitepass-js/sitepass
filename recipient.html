<script>
(function(){

  function esc(value){return String(value==null?'':value).replace(/[&<>'"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];});}
  function parseRoute(){

      var raw=hash.replace(/^#manager=/i,'').split('&');

      raw.forEach(function(part){var pair=part.split('=');if(pair[0]==='sig')sig=decodeURIComponent(pair.slice(1).join('=')||'');});
    }
    return {code:code,sig:sig,fromMember:p.get('from')==='member'||p.get('preview')==='member'};
  }
  function setExitMode(){
    if(state.fromMember){exitButton.textContent='← 보관함으로 돌아가기';navLabel.textContent='회원용 링크화면 미리보기';}

  function exitViewer(){

  }
  exitButton.addEventListener('click',exitViewer);

  function collectCandidates(root){
    var out=[],seen=new WeakSet();
    function walk(node,depth){
      if(!node||typeof node!=='object'||depth>5||seen.has(node))return;
      seen.add(node);
      if(Array.isArray(node)){node.forEach(function(v){walk(v,depth+1);});return;}
      out.push(node);
      ['item_data','payload','item_json','item','data','share_item','shareItem','result'].forEach(function(key){if(node[key]&&typeof node[key]==='object')walk(node[key],depth+1);});
    }
    walk(root,0);return out;
  }
  function normalizeItem(root,code){
    var candidates=collectCandidates(root),merged={},docs={};
    candidates.slice().reverse().forEach(function(c){
      Object.keys(c).forEach(function(key){if(['item_data','payload','item_json','item','data','share_item','shareItem','result','docs','documents'].indexOf(key)<0&&c[key]!==undefined&&c[key]!==null&&c[key]!=='')merged[key]=c[key];});
      if(c.docs&&typeof c.docs==='object'&&!Array.isArray(c.docs))Object.keys(c.docs).forEach(function(key){var d=c.docs[key];if(d&&typeof d==='object')docs[key]=Object.assign({},docs[key]||{},d,{key:String(d.key||key)});});
      if(Array.isArray(c.documents))c.documents.forEach(function(d,i){if(!d||typeof d!=='object')return;var key=String(d.key||d.docKey||d.doc_key||d.type||d.kind||('document'+(i+1))).trim();if(key)docs[key]=Object.assign({},docs[key]||{},d,{key:key});});
    });
    merged.docs=docs;merged.code=String(code||merged.code||merged.share_code||merged.publicShareCode||merged.managerShareCode||'').trim();
    return merged;
  }
  function firstValue(obj,keys){for(var i=0;i<keys.length;i++){var v=obj&&obj[keys[i]];if(v!==undefined&&v!==null&&String(v).trim())return String(v).trim();}return '';}
  function absoluteStorageUrl(path,bucket){
    path=String(path||'').trim();if(!path)return '';
    if(/^(data:|blob:|https?:\/\/)/i.test(path))return path;
    path=path.replace(/^\/+/, '').replace(/^storage\/v1\/object\/(?:public|sign)\//i,'');
    bucket=String(bucket||STORAGE_BUCKET).trim()||STORAGE_BUCKET;
    if(path.indexOf(bucket+'/')===0)path=path.slice(bucket.length+1);
    if(path.indexOf('public/'+bucket+'/')===0)path=path.slice(('public/'+bucket+'/').length);
    var encoded=path.split('/').filter(Boolean).map(encodeURIComponent).join('/');
    return encoded?SUPABASE_URL+'/storage/v1/object/public/'+bucket+'/'+encoded:'';
  }
  function resolveUrl(value){
    if(typeof value==='string')return absoluteStorageUrl(value,STORAGE_BUCKET);
    if(!value||typeof value!=='object')return '';
    var urlKeys=['previewDataUrl','editDataUrl','correctedDataUrl','originalDataUrl','fileDataUrl','fileUrl','file_url','downloadUrl','download_url','storagePublicUrl','storage_public_url','publicUrl','public_url','previewUrl','preview_url','signedUrl','signed_url','imageUrl','image_url','src','url'];
    for(var i=0;i<urlKeys.length;i++){var v=value[urlKeys[i]];if(typeof v==='string'&&v.trim())return absoluteStorageUrl(v,firstValue(value,['storageBucket','storage_bucket','bucket'])||STORAGE_BUCKET);}
    var pathKeys=['storagePath','storage_path','filePath','file_path','objectPath','object_path','uploadPath','upload_path','storedPath','stored_path','path'];
    for(var j=0;j<pathKeys.length;j++){var p=value[pathKeys[j]];if(typeof p==='string'&&p.trim())return absoluteStorageUrl(p,firstValue(value,['storageBucket','storage_bucket','bucket'])||STORAGE_BUCKET);}
    var nestedKeys=['file','blob','asset','upload','storage','original','corrected','preview'];
    for(var k=0;k<nestedKeys.length;k++){var n=value[nestedKeys[k]];if(n&&typeof n==='object'){var found=resolveUrl(n);if(found)return found;}}
    return '';
  }
  function pageList(doc){
    var arrays=['pages','files','attachments','images','items'];
    for(var i=0;i<arrays.length;i++){if(Array.isArray(doc[arrays[i]])&&doc[arrays[i]].length)return doc[arrays[i]].filter(Boolean).map(function(p){return typeof p==='string'?{url:p,fileName:p.split('/').pop()}:p;});}
    return resolveUrl(doc)?[doc]:[];
  }
  function normalizeDocs(item){
    var result=[];Object.keys(item.docs||{}).forEach(function(key){
      var doc=item.docs[key];if(!doc||typeof doc!=='object')return;
      var pages=pageList(doc),title=firstValue(doc,['title','documentTitle','docTitle','name'])||DOC_TITLES[key]||key;
      var group=firstValue(doc,['groupTitle','group_name','categoryTitle']);
      var fileName=firstValue(doc,['fileName','filename','name']);
      var hasMeta=pages.length||fileName||firstValue(doc,['expireDate','expiryDate','status']);
      if(!hasMeta)return;
      result.push({key:key,title:title,groupTitle:group,pages:pages,raw:doc,fileName:fileName,expireDate:firstValue(doc,['expireDate','expiryDate','expirationDate','validUntil']),status:firstValue(doc,['status','state'])});
    });
    return result;
  }
  function isPdf(page,doc){var url=resolveUrl(page)||resolveUrl(doc.raw),name=firstValue(page,['fileName','filename','name'])||doc.fileName,type=firstValue(page,['fileType','mimeType','mime_type','type'])||firstValue(doc.raw,['fileType','mimeType','mime_type']);return /pdf/i.test(type)||/\.pdf(?:$|[?#])/i.test(url)||/\.pdf$/i.test(name);}
  function formatDate(value){if(!value)return '';var d=new Date(value);if(isNaN(d.getTime()))return String(value);return d.getFullYear()+'. '+String(d.getMonth()+1).padStart(2,'0')+'. '+String(d.getDate()).padStart(2,'0')+'.';}
  function getExpiry(root){var c=collectCandidates(root);for(var i=0;i<c.length;i++){var v=c[i].expiresAt||c[i].expires_at||c[i].managerExpireAt||c[i].manager_expire_at;if(v){var ms=typeof v==='number'?v:new Date(v).getTime();if(ms)return ms;}}return 0;}
  function label(item){var name=firstValue(item,['equipmentName','equipment_name','machineName','name']);var no=firstValue(item,['equipmentNo','equipment_no','registrationNo','vehicleNo']);return [name,no].filter(Boolean).join(' ')||'장비';}
  function includedText(docs){var groups=[];docs.forEach(function(d){var g=d.groupTitle||(/driver/i.test(d.key)?'장비기사서류':/worker/i.test(d.key)?'인부서류':'장비서류');if(groups.indexOf(g)<0)groups.push(g);});return groups.join(' · ')||'공유서류';}

  function renderItem(item,sourceRoot){
    state.item=item;state.docs=normalizeDocs(item);state.expiresAt=getExpiry(sourceRoot)||getExpiry(item);
    if(state.expiresAt&&Date.now()>state.expiresAt){renderError('만료된 담당자 링크입니다.','장비업자에게 새 공유 링크를 다시 받아주세요.',false);return;}
    var equipmentName=firstValue(item,['equipmentName','equipment_name','machineName'])||'장비';
    var equipmentNo=firstValue(item,['equipmentNo','equipment_no','registrationNo','vehicleNo'])||'-';
    var expireHtml=state.expiresAt?'<div class="expire"><strong>담당자 링크 만료일</strong>'+esc(formatDate(state.expiresAt))+'까지 열람할 수 있습니다.</div>':'';
    var docsHtml=state.docs.map(function(doc,index){
      var pages=doc.pages,first=pages[0]||doc.raw,url=resolveUrl(first)||resolveUrl(doc.raw),meta=[];
      if(pages.length)meta.push(pages.length+'장');if(doc.expireDate)meta.push('만료 '+formatDate(doc.expireDate));if(doc.status)meta.push(doc.status);
      return '<article class="doc-card"><div class="doc-head"><div class="doc-title"><small>'+esc(doc.groupTitle||'제출서류')+'</small><strong>'+(index+1)+'. '+esc(doc.title)+'</strong></div><span class="badge '+(url?'':'missing')+'">'+(url?'첨부됨':'파일확인')+'</span></div><div class="doc-meta">'+esc(meta.join(' · ')||(doc.fileName||'등록된 서류'))+'</div><div class="doc-actions"><button class="detail-btn" type="button" data-detail-index="'+index+'">상세보기</button>'+(url?'<a class="file-link" href="'+esc(url)+'" target="_blank" rel="noopener">원본 열기</a>':'<span class="file-link disabled">원본 없음</span>')+'</div></article>';
    }).join('');
    content.className='';
    content.innerHTML='<section class="card hero"><div class="eyebrow">QR·링크로 받은 담당자 화면</div><h1>'+esc(label(item))+' 서류</h1><p>담당자가 장비·기사·인부 서류를 바로 확인하는 전용 화면입니다.</p><div class="status-grid"><span>코드입력 없음</span><span>서류 상세보기</span><span>수정·갱신 불가</span></div></section><section class="card"><div class="info-row"><b>장비 등록번호</b><span>'+esc(equipmentNo)+'</span></div><div class="info-row"><b>장비명</b><span>'+esc(equipmentName)+'</span></div><div class="info-row"><b>포함서류</b><span>'+esc(includedText(state.docs))+'</span></div>'+expireHtml+'</section><div class="section-title"><h2>다운로드·확인 서류</h2><span>'+state.docs.length+'개 서류</span></div><div class="docs">'+(docsHtml||'<section class="card empty"><b>공유된 서류가 없습니다.</b><span>장비업자에게 서류가 포함된 링크를 다시 보내달라고 요청해주세요.</span></section>')+'</div><div class="notice">서류가 보이지 않거나 파일이 열리지 않으면 아래의 다시 불러오기를 눌러 최신 서버자료를 확인하세요.<br><button class="retry" type="button" data-retry style="margin-top:10px">다시 불러오기</button></div><div class="sponsor">운영·개발: 제이에스건설 · <a href="https://www.songwongeo.co.kr" target="_blank" rel="noopener">송원건설 홈페이지</a></div>';
  }
  function renderError(title,message,retry){content.className='card error';content.innerHTML='<b>'+esc(title)+'</b><span>'+esc(message||'')+'</span>'+(retry?'<button class="retry" type="button" data-retry>다시 불러오기</button>':'');}
  function timeoutFetch(url,options,ms){var ctl=new AbortController(),timer=setTimeout(function(){ctl.abort();},ms||10000);options=Object.assign({},options||{},{signal:ctl.signal,cache:'no-store'});return fetch(url,options).finally(function(){clearTimeout(timer);});}
  async function rpcLoad(){
    var res=await timeoutFetch(SUPABASE_URL+'/rest/v1/rpc/sitepass_get_public_share_item',{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({p_share_code:state.code,p_share_sig:state.sig||''})},10000);
    var text=await res.text(),data=null;try{data=text?JSON.parse(text):null;}catch(e){}
    if(!res.ok)throw new Error((data&&data.message)||('서버 조회 오류 '+res.status));
    if(Array.isArray(data))data=data[0]||null;
    if(data&&(data.ok===false||data.notFound||data.not_found||data.expired))return {error:data.message||data.error||'공유 링크를 찾을 수 없습니다.',expired:!!data.expired,root:data};
    return {root:data};
  }
  async function directLoad(){
    var query=SUPABASE_URL+'/rest/v1/sitepass_public_shares?share_code=eq.'+encodeURIComponent(state.code)+'&select=share_code,share_sig,expires_at,item_data,payload&limit=1';
    var res=await timeoutFetch(query,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,Accept:'application/json'}},10000);var text=await res.text(),data=null;try{data=text?JSON.parse(text):null;}catch(e){}
    if(!res.ok)throw new Error((data&&data.message)||('서버 직접조회 오류 '+res.status));
    return {root:Array.isArray(data)?data[0]:data};
  }
  function previewSnapshot(){try{var raw=sessionStorage.getItem('sitepass_recipient_preview_v506_'+state.code);if(!raw)return null;var parsed=JSON.parse(raw);return parsed&&typeof parsed==='object'?parsed:null;}catch(e){return null;}}
  async function load(){
    if(!state.code){renderError('담당자 링크 정보가 없습니다.','링크 주소를 다시 확인해주세요.',false);return;}
    content.className='card loading';content.innerHTML='<span class="spinner" aria-hidden="true"></span><b>담당자 서류를 불러오는 중입니다.</b><span>서버에서 최신 공유자료를 확인하고 있습니다.</span>';
    var snapshot=previewSnapshot();if(snapshot){var snapItem=normalizeItem(snapshot,state.code);if(normalizeDocs(snapItem).length)renderItem(snapItem,snapshot);}
    var lastError='';
    for(var attempt=0;attempt<2;attempt++){
      try{
        var loaded=await rpcLoad();
        if(loaded.expired){renderError('만료된 담당자 링크입니다.',loaded.error||'새 링크를 요청해주세요.',false);return;}
        if(loaded.root){var item=normalizeItem(loaded.root,state.code);if(item&&normalizeDocs(item).length){renderItem(item,loaded.root);return;}lastError=loaded.error||'공유 데이터에 서류가 없습니다.';}
        if(attempt===0)await new Promise(function(r){setTimeout(r,500);});
      }catch(e){lastError=e&&e.message?e.message:String(e);if(attempt===0)await new Promise(function(r){setTimeout(r,500);});}
    }
    try{var direct=await directLoad();if(direct.root){var directItem=normalizeItem(direct.root,state.code);if(directItem&&normalizeDocs(directItem).length){renderItem(directItem,direct.root);return;}}}catch(e){lastError=lastError||e.message;}
    if(snapshot){var fallback=normalizeItem(snapshot,state.code);if(fallback&&normalizeDocs(fallback).length){renderItem(fallback,snapshot);return;}}
    renderError('서류를 불러오지 못했습니다.',lastError||'장비업자에게 새 링크를 다시 보내달라고 요청해주세요.',true);
  }
  function closeModal(){var modal=document.getElementById('docModal');if(modal)modal.remove();document.body.classList.remove('modal-open');}
  function printUrl(url){var win=window.open(url,'_blank','noopener');if(!win)return;try{win.addEventListener('load',function(){setTimeout(function(){try{win.print();}catch(e){}},500);},{once:true});}catch(e){}}
  function openDetail(index){
    var doc=state.docs[Number(index)];if(!doc)return;
    var pages=doc.pages.length?doc.pages:[doc.raw];
    var html=pages.map(function(page,i){var url=resolveUrl(page)||resolveUrl(doc.raw),name=firstValue(page,['fileName','filename','name'])||doc.fileName||doc.title;if(!url)return '<section class="page"><div class="page-title">'+(i+1)+'. '+esc(name)+'</div><div class="missing-page">파일 주소를 찾지 못했습니다.<br>장비업자에게 이 서류를 다시 등록해달라고 요청해주세요.</div></section>';var body=isPdf(page,doc)?'<iframe src="'+esc(url)+'" title="'+esc(name)+'"></iframe>':'<img src="'+esc(url)+'" alt="'+esc(name)+'">';return '<section class="page"><div class="page-title">'+(i+1)+'. '+esc(name)+'</div>'+body+'<div class="page-actions"><a href="'+esc(url)+'" target="_blank" rel="noopener">원본 새 창</a><button type="button" data-print-url="'+esc(url)+'">인쇄</button></div></section>';}).join('');
    closeModal();var modal=document.createElement('div');modal.id='docModal';modal.className='modal';modal.innerHTML='<div class="backdrop" data-close-modal></div><div class="sheet" role="dialog" aria-modal="true" aria-label="'+esc(doc.title)+' 상세보기"><div class="modal-head"><div><small>SitePass 서류 상세보기</small><strong>'+esc(doc.title)+'</strong></div><button class="close-x" type="button" data-close-modal aria-label="닫기">×</button></div><div class="modal-body">'+html+'</div><button class="close-bottom" type="button" data-close-modal>닫기</button></div>';document.body.appendChild(modal);document.body.classList.add('modal-open');
  }
  document.addEventListener('click',function(event){var detail=event.target.closest&&event.target.closest('[data-detail-index]');if(detail){event.preventDefault();openDetail(detail.getAttribute('data-detail-index'));return;}var retry=event.target.closest&&event.target.closest('[data-retry]');if(retry){event.preventDefault();load();return;}var close=event.target.closest&&event.target.closest('[data-close-modal]');if(close){event.preventDefault();closeModal();return;}var print=event.target.closest&&event.target.closest('[data-print-url]');if(print){event.preventDefault();printUrl(print.getAttribute('data-print-url'));}});
  document.addEventListener('keydown',function(event){if(event.key==='Escape')closeModal();});
  var route=parseRoute();state.code=route.code;state.sig=route.sig;state.fromMember=route.fromMember;setExitMode();load();
})();
</script>
